services:
  mc:
    image: ghcr.io/energypatrikhu/pterodactyl-minecraft-serveru/pterodactyl-minecraft-server:latest
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "FABRIC"
      MEMORY: 4G
      MODRINTH_PROJECTS: |
        fabric-api
        cardboard:beta
      USES_PLUGINS: true
    volumes:
      - mc-data:/home/container
      - ./plugins:/plugins:ro
volumes:
  mc-data:
